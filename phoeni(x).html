<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced Mathematical Phoenix - Anatomical Realism</title>
    <style>
        body { margin: 0; background: #fff; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        #description { position: absolute; top: 20px; left: 20px; width: 320px; font-family: 'Garamond', serif; pointer-events: none; background: rgba(255,255,255,0.8); padding: 15px; border: 1px solid #ddd; }
        canvas { box-shadow: 0 0 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div id="description">
    <h3 style="margin-top:0">The Phoenix Equations</h3>
    <p style="font-size: 13px;">A high-order parametric system where each circle's position $(X_k, Y_k)$ is a composite of localized anatomical harmonics.</p>
    <code style="font-size: 11px; display: block; background: #eee; padding: 5px;">
        X(k) = Σ [Pos_x + Feather_x(k, ω, p)]<br>
        Y(k) = Σ [Pos_y + Feather_y(k, ω, p)]<br>
        R(k) = Base_r * sin(πk/N)^12
    </code>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
<script>
    let k = 0;
    const N = 20000; // High density for realistic plumage
    const batchSize = 120; // Drawing speed

    function setup() {
        createCanvas(windowWidth, windowHeight);
        background(255);
        noFill();
        stroke(0, 0, 0, 90);
        strokeWeight(0.2);
    }

    function draw() {
        for (let i = 0; i < batchSize; i++) {
            if (k < N) {
                drawRealisticPart(k);
                k++;
            }
        }
    }

    function drawRealisticPart(index) {
        let t = index / N;
        let centerX = width / 2;
        let centerY = height / 2;
        let scale = min(width, height) * 0.45;

        let x = 0, y = 0, r = 0.5;

        // 1. ANATOMICAL SKELETON (The "S" Spine)
        let spineX = 0.1 * sin(TWO_PI * t * 0.8);
        let spineY = (t - 0.5) * 1.8;

        // 2. MODULAR ANATOMY LOGIC
        if (t < 0.05) { 
            // THE HEAD & BEAK
            // Uses localized high-power cos to sharpen the beak
            let beakAngle = map(t, 0, 0.05, -PI/2, 0);
            x = spineX + 0.05 * cos(beakAngle) + pow(sin(t * 1000), 10) * 0.01;
            y = spineY + 0.05 * sin(beakAngle);
            r = 0.4;
        } 
        else if (t < 0.5) { 
            // THE LAYERED WINGS
            // Harmonic interference creates the "shredded" feather look
            let wingSide = (index % 2 === 0) ? 1 : -1;
            let wingProg = map(t, 0.05, 0.5, 0, 1);
            
            // Primary and Secondary feather harmonics
            let freq = 60;
            let featherLength = 0.8 * sin(PI * wingProg) * pow(abs(sin(t * PI * freq)), 20);
            let angle = wingSide * (PI * 0.7 * wingProg + 0.5);
            
            x = spineX + featherLength * cos(angle);
            y = spineY + featherLength * sin(angle) - wingProg * 0.2;
            r = 0.3 + (1 - featherLength) * 0.8;
        } 
        else if (t < 0.65) {
            // THE BODY PLUMAGE
            // Dense, small circles to create volume
            x = spineX + 0.1 * sin(t * 500) * pow(sin(t * PI), 10);
            y = spineY;
            r = 0.5;
        }
        else { 
            // THE TAIL (The "Realistic" Multi-Strand flow)
            let tailProg = map(t, 0.65, 1, 0, 1);
            let strandCount = 7;
            let strandId = index % strandCount;
            let strandFreq = 4 + strandId * 0.5;
            
            let tailWave = 0.4 * tailProg * sin(tailProg * strandFreq + strandId);
            let tailWidth = 0.2 * sin(PI * tailProg);
            
            x = spineX + tailWave + (strandId - 3) * 0.02;
            y = spineY + tailProg * 0.5;
            r = 0.4 * (1 - tailProg);
        }

        // Apply global scale and center
        let finalX = centerX + x * scale;
        let finalY = centerY + y * scale;
        
        // Final circle rendering
        ellipse(finalX, finalY, r * 2.5);

        // Add "Eye" detail at specific k
        if (index === 100) {
            strokeWeight(2);
            point(finalX, finalY);
            strokeWeight(0.2);
        }
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
        background(255);
        k = 0;
    }
</script>

</body>
</html>
