<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mathematical Phoenix - Final Refinement</title>
    <style>
        body { margin: 0; background: #fff; overflow: hidden; font-family: serif; }
        #info { position: absolute; top: 20px; left: 20px; width: 300px; z-index: 10; font-size: 12px; pointer-events: none; }
    </style>
</head>
<body>

<div id="info">
    <h2>Phoenix v2.0</h2>
    <p><i>Parametric System:</i></p>
    <b>X(k)</b> = cos(θ) * (R + f(k))<br>
    <b>Y(k)</b> = sin(θ) * (R + f(k))<br>
    <p>Using 12,000 harmonic circles to emulate the flowing "S" structure of the reference.</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
<script>
    let k = 0;
    const totalCircles = 12000;

    function setup() {
        createCanvas(windowWidth, windowHeight);
        background(255);
        noFill();
        stroke(0, 0, 0, 80); // Softer stroke for better "feather" layering
        strokeWeight(0.4);
    }

    function draw() {
        // Draw 40 circles per frame for a "writing" effect
        for (let i = 0; i < 40; i++) {
            if (k < totalCircles) {
                drawPhoenixPart(k);
                k++;
            }
        }
    }

    function drawPhoenixPart(index) {
        let t = map(index, 0, totalCircles, 0, 1);
        let centerX = width / 2;
        let centerY = height / 2;
        
        let x, y, r;

        // 1. THE MAIN BODY (The "S" Curve)
        // We use a combination of two sine waves to create the vertical swirl
        let bodyAngle = t * TWO_PI * 1.5;
        let bodyX = 150 * sin(bodyAngle) * cos(t * PI);
        let bodyY = 400 * t - 200 + 50 * cos(bodyAngle);

        // 2. THE FEATHERS/WINGS
        // High frequency oscillations that grow out from the body
        let wingFrequency = 80; 
        let wingSpread = sin(index * 0.1) * (t * 200);
        
        // This adds the "shredded" look of the feathers in the reference
        let featherDetail = pow(sin(t * PI * wingFrequency), 10) * 100 * t;

        if (t < 0.7) {
            // Upper Wing Section
            x = centerX + bodyX + (featherDetail * cos(bodyAngle * 0.5));
            y = centerY + bodyY - (featherDetail * sin(bodyAngle * 0.2));
            r = 0.5 + t * 2;
        } else {
            // Tail Section - Swirling down
            let tailSwirl = (t - 0.7) * 10;
            x = centerX + bodyX + 150 * sin(tailSwirl) * t;
            y = centerY + bodyY + 100 * cos(tailSwirl);
            r = 0.3 + (1-t) * 3;
        }

        // Add a bit of "Naderi Yeganeh" complexity: a secondary circle center
        let finalX = x + 20 * pow(sin(index * 0.5), 7);
        let finalY = y + 10 * pow(cos(index * 0.5), 7);

        ellipse(finalX, finalY, r * 2);
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
        background(255);
        k = 0;
    }
</script>
</body>
</html>
