<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Course Planner</title>

<style>
:root {
  --blue: #041a3b;
  --accent: #0bb3d6;
  --border: #d6dbe1;
  --light: #f5f7fa;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--light);
}

/* HERO */
.hero {
  background: var(--blue);
  color: white;
  padding: 60px 20px 40px;
}

.hero h1 {
  max-width: 1000px;
  margin: 0 auto 20px;
  font-size: 2.8rem;
}

/* SEARCH */
.search-bar {
  max-width: 1000px;
  margin: auto;
  display: flex;
}

.search-bar input {
  flex: 1;
  padding: 16px;
  font-size: 1rem;
  border: none;
  outline: none;
}

.search-bar button {
  background: var(--accent);
  border: none;
  padding: 0 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
}

.search-icon {
  width: 18px;
  height: 18px;
  border: 2px solid #041a3b;
  border-radius: 50%;
  position: relative;
}
.search-icon::after {
  content: "";
  position: absolute;
  width: 10px;
  height: 2px;
  background: #041a3b;
  bottom: -6px;
  right: -6px;
  transform: rotate(45deg);
}

/* DROPDOWN */
.dropdown {
  max-width: 1000px;
  margin: auto;
  background: white;
  border: 1px solid var(--border);
}

.dropdown div {
  padding: 12px;
  cursor: pointer;
  color: black; /* FIXED */
}

.dropdown div:hover,
.active {
  background: #eef3f8;
}

/* RESULTS */
.container {
  max-width: 1000px;
  margin: 40px auto;
  padding: 0 20px;
}

.top-links a {
  display: block;
  margin-bottom: 10px;
  color: #094183;
  font-weight: 600;
  text-decoration: none;
}

.grid {
  margin-top: 30px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 16px;
}

.card {
  background: white;
  border: 1px solid var(--border);
  padding: 20px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="hero">
  <h1>Course Planner</h1>

  <div class="search-bar">
    <input id="search" placeholder="Search by keywords">
    <button id="searchBtn">
      <div class="search-icon"></div>
    </button>
  </div>

  <div id="dropdown" class="dropdown"></div>
</div>

<div class="container">
  <div id="results"></div>
</div>

<script>
/* -------------------------
   L1 DATA
------------------------- */
const L1 = [
"I’m a new student and need help getting started",
"I need support with exams, assessments, results, or ongoing circumstances affecting my study",
"I’m considering another course or graduate study",
"I need help choosing, changing, or planning my subjects",
"I need to understand my course structure, majors/minors and study load",
"I need help enrolling and managing my study plan for my course or concurrent diploma",
"I have questions about credit from my previous study",
"I want to study overseas as part of my course"
];

/* -------------------------
   L2 → L1 MAPPING (CRITICAL FIX)
------------------------- */
const mapping = {
"What should I do if my student visa isn’t granted in time to start my course?": L1[0],
"How do I plan my first year and enrol before semester starts?": L1[0],
"What is the Student Learning Entitlement (SLE)?": L1[0],

"How is my Weighted Average Mark (WAM) calculated and what counts toward it?": L1[1],
"What support can I get if circumstances affect my assessments?": L1[1],
"What should I do if I fail a subject?": L1[1],

"How do I transfer from one University of Melbourne degree to another?": L1[2],
"What are the entry requirements for my course, and are there guaranteed entry pathways?": L1[2],

"Can someone review my course plan in My Course Planner?": L1[3],
"Can I get advice on the subjects I’ve chosen this semester?": L1[3],

"Can someone help me understand my course structure and course rules?": L1[4],
"How do I plan or change my major, minor, or specialisation?": L1[4],

"How do I make changes to my Study Plan or subjects?": L1[5],
"Why can’t I enrol in a subject?": L1[5],

"Am I eligible for advanced standing (credit) in my course?": L1[6],

"Can I study overseas as part of my course?": L1[7],
"How will studying on exchange affect my WAM?": L1[7]
};

/* Build L2 list */
const L2 = Object.keys(mapping);

/* -------------------------
   SEARCH
------------------------- */
function match(text, query) {
  const words = query.toLowerCase().split(" ").filter(Boolean);
  text = text.toLowerCase();
  return words.some(w => text.includes(w));
}

/* -------------------------
   DROPDOWN
------------------------- */
const input = document.getElementById("search");
const dropdown = document.getElementById("dropdown");
const results = document.getElementById("results");
const button = document.getElementById("searchBtn");

let currentResults = [];

function updateDropdown(query) {
  if (!query) return dropdown.innerHTML = "";

  let matches = L2.filter(item => match(item, query));

  if (!matches.length) {
    matches = L1.filter(item => match(item, query));
  }

  currentResults = matches.slice(0,5);

  dropdown.innerHTML = currentResults
    .map((r,i) => `<div data-i="${i}">${r}</div>`)
    .join("");
}

/* -------------------------
   RESULTS
------------------------- */
function renderResults(query) {
  const matchedL2 = L2.filter(q => match(q, query)).slice(0,5);

  /* derive L1 FROM mapping */
  const l1Set = new Set(
    matchedL2.map(q => mapping[q])
  );

  const matchedL1 = [...l1Set];

  results.innerHTML = `
    <div class="top-links">
      ${matchedL2.map(x => `<a href="#">${x}</a>`).join("")}
    </div>

    <div class="grid">
      ${matchedL1.map(x => `<div class="card">${x}</div>`).join("")}
    </div>
  `;
}

/* -------------------------
   EVENTS
------------------------- */
input.addEventListener("input", e => updateDropdown(e.target.value));

button.addEventListener("click", () => {
  renderResults(input.value);
  dropdown.innerHTML = "";
});

input.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    renderResults(input.value);
    dropdown.innerHTML = "";
  }
});

/* click outside */
document.addEventListener("click", e => {
  if (!e.target.closest(".search-bar")) {
    dropdown.innerHTML = "";
  }
});
</script>

</body>
</html>
