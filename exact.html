<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Course Planner</title>

<style>
:root {
  --blue: #041a3b;
  --accent: #0bb3d6;
  --border: #d6dbe1;
  --light: #f5f7fa;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--light);
}

/* HERO */
.hero {
  background: var(--blue);
  color: white;
  padding: 60px 20px 40px;
}

.hero h1 {
  max-width: 1000px;
  margin: 0 auto 20px;
  font-size: 2.8rem;
}

/* SEARCH BAR */
.search-bar {
  max-width: 1000px;
  margin: auto;
  display: flex;
}

.search-bar input {
  flex: 1;
  padding: 16px;
  font-size: 1rem;
  border: none;
  outline: none;
}

.search-bar button {
  background: var(--accent);
  border: none;
  padding: 0 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
}

.search-bar button:hover {
  background: #099bb8;
}

/* SEARCH ICON */
.search-icon {
  width: 18px;
  height: 18px;
  border: 2px solid #041a3b;
  border-radius: 50%;
  position: relative;
}
.search-icon::after {
  content: "";
  position: absolute;
  width: 10px;
  height: 2px;
  background: #041a3b;
  bottom: -6px;
  right: -6px;
  transform: rotate(45deg);
}

/* DROPDOWN */
.dropdown {
  max-width: 1000px;
  margin: auto;
  background: white;
  border: 1px solid var(--border);
}

.dropdown div {
  padding: 12px;
  cursor: pointer;
}

.dropdown div:hover,
.active {
  background: #eef3f8;
}

/* RESULTS */
.container {
  max-width: 1000px;
  margin: 40px auto;
  padding: 0 20px;
}

/* L2 LINKS */
.top-links a {
  display: block;
  margin-bottom: 10px;
  color: #094183;
  font-weight: 600;
  text-decoration: none;
}

.top-links a:hover {
  text-decoration: underline;
}

/* L1 CARDS */
.grid {
  margin-top: 30px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 16px;
}

.card {
  background: white;
  border: 1px solid var(--border);
  padding: 20px;
  border-radius: 4px;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  border-color: #094183;
  box-shadow: 0 3px 8px rgba(0,0,0,0.08);
}
</style>
</head>

<body>

<div class="hero">
  <h1>Course Planner</h1>

  <div class="search-bar">
    <input id="search" placeholder="Search by keywords">
    <button id="searchBtn">
      <div class="search-icon"></div>
    </button>
  </div>

  <div id="dropdown" class="dropdown"></div>
</div>

<div class="container">
  <div id="results"></div>
</div>

<script>
const L1 = [
"I’m a new student and need help getting started",
"I need support with exams, assessments, results, or ongoing circumstances affecting my study",
"I’m considering another course or graduate study",
"I need help choosing, changing, or planning my subjects",
"I need to understand my course structure, majors/minors and study load",
"I need help enrolling and managing my study plan for my course or concurrent diploma",
"I have questions about credit from my previous study",
"I want to study overseas as part of my course"
];

const L2 = [
"How do I plan my first year and enrol before semester starts?",
"What is the Student Learning Entitlement (SLE)?",
"How is my Weighted Average Mark (WAM) calculated?",
"What are the entry requirements for my course?",
"Who can I speak to about graduate coursework study options?",
"How do I transfer courses?",
"What happens if I withdraw from a subject?",
"Can I get advice on subjects this semester?",
"How do I take part in Melbourne Plus?",
"What internship subjects can I take?",
"Can someone help me understand prerequisites?",
"How do I change my study load?",
"Am I eligible for an early exit award?",
"How do I plan my major or minor?",
"How do I withdraw from my course?",
"Why can’t I enrol in a subject?",
"How do I change my Study Plan?",
"What support can I get for assessments?",
"What should I do if I fail a subject?",
"What options do I have if I miss an exam?",
"How do I access supplementary exams?",
"How do I plan my course with credit?",
"Am I eligible for advanced standing?",
"Can I study overseas?",
"How will exchange affect my WAM?"
];

const input = document.getElementById("search");
const dropdown = document.getElementById("dropdown");
const results = document.getElementById("results");
const button = document.getElementById("searchBtn");

let currentResults = [];
let activeIndex = -1;

/* SMART MATCHING */
function score(text, words) {
  text = text.toLowerCase();
  let s = 0;

  words.forEach(w => {
    if (text.includes(w)) s += 2;
    if (text.startsWith(w)) s += 3;
  });

  return s;
}

function search(data, query) {
  const words = query.toLowerCase().split(" ").filter(Boolean);

  return data
    .map(item => ({ item, score: score(item, words) }))
    .filter(x => x.score > 0)
    .sort((a,b) => b.score - a.score)
    .map(x => x.item);
}

/* DROPDOWN */
function updateDropdown(query) {
  if (!query) {
    dropdown.innerHTML = "";
    return;
  }

  let matches = search(L2, query);
  if (!matches.length) matches = search(L1, query);

  currentResults = matches.slice(0,5);

  dropdown.innerHTML = currentResults
    .map((r,i) => `<div data-index="${i}">${r}</div>`)
    .join("");
}

/* RESULTS VIEW */
function renderResults(query) {
  const l2 = search(L2, query).slice(0,5);
  const l1 = search(L1, query); // ONLY relevant

  results.innerHTML = `
    <div class="top-links">
      ${l2.map(x => `<a href="#">${x}</a>`).join("")}
    </div>

    <div class="grid">
      ${l1.map(x => `<div class="card">${x}</div>`).join("")}
    </div>
  `;
}

/* EVENTS */
input.addEventListener("input", e => updateDropdown(e.target.value));

button.addEventListener("click", () => {
  renderResults(input.value);
  dropdown.innerHTML = "";
});

input.addEventListener("keydown", e => {
  const items = dropdown.children;

  if (e.key === "ArrowDown") {
    activeIndex = (activeIndex + 1) % items.length;
  } else if (e.key === "ArrowUp") {
    activeIndex = (activeIndex - 1 + items.length) % items.length;
  } else if (e.key === "Enter") {
    renderResults(input.value);
    dropdown.innerHTML = "";
    return;
  }

  [...items].forEach(el => el.classList.remove("active"));
  if (items[activeIndex]) items[activeIndex].classList.add("active");
});

/* CLICK OUTSIDE */
document.addEventListener("click", e => {
  if (!e.target.closest(".search-bar")) {
    dropdown.innerHTML = "";
  }
});
</script>

</body>
</html>
